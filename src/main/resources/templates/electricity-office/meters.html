<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper}, title=~{::title}, styles=~{::link}, bodyClass='electricity-body')}">

<head>
    <title>Electricity Grid Directory</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">
        
        <div class="row mb-5">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="display-5 fw-bold text-warning">Grid Infrastructure</h2>
                    <a href="/electricity-office/add-meter" class="btn btn-warning btn-sm text-dark">Deploy New Smart Meter</a>
                </div>
                <hr class="border-warning opacity-50">
            </div>
        </div>

        <div class="card admin-card p-4 border-warning">
            <div class="table-responsive">
                <table class="table text-white">
                    <thead>
                        <tr class="text-warning small text-uppercase">
                            <th>Meter ID</th>
                            <th>Grid User</th>
                            <th>Service Address</th>
                            <th>Current Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="meter : ${meters}">
                            <td class="fw-bold" th:text="${meter.meterNumber}">ELE-001</td>
                            <td th:text="${meter.user.fullName}">Jane Smith</td>
                            <td th:text="${meter.assignedAddress}">456 Power Ave</td>
                            <td><span class="badge bg-warning text-dark">ENERGIZED</span></td>
                            <td>
                                <a th:href="@{/electricity-office/add-reading/{id}(id=${meter.id})}" class="btn btn-outline-warning btn-sm">
                                    <i class="fas fa-bolt me-1"></i> Add Load Reading
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
