<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content}, title=~{::title}, styles=~{::style}, bodyClass='customer-body')}">

<head>
    <title>Financial Overview - Smart Grid</title>
    <style>
        @import url('/css/customer.css');

        body {
            padding-top: 100px;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="mb-5">
            <h1 class="display-5 fw-bold"><i class="fas fa-file-invoice-dollar text-warning me-2"></i> Pay <span
                    class="text-warning">Your Bills</span></h1>
            <p class="text-white-50">View your open invoices and complete your payment below.</p>
        </div>

        <div class="glass-card shadow-lg">
            <div class="table-responsive">
                <table class="table customer-table">
                    <thead>
                        <tr>
                            <th>Invoice ID</th>
                            <th>Meter Reference</th>
                            <th>Billing Period</th>
                            <th>Amount (RWF)</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${bills}">
                            <td class="fw-bold" th:text="${b.id}">1</td>
                            <td th:text="${b.meter.meterNumber}">Meter</td>
                            <td th:text="${b.billingPeriod}">Jan 2026</td>
                            <td class="fw-bold text-info" th:text="${'RWF ' + #numbers.formatDecimal(b.amount, 1, 0)}">RWF 100
                            </td>
                            <td th:text="${#temporals.format(b.dueDate, 'dd MMM yyyy')}">2026-02-15</td>
                            <td>
                                <span class="badge badge-status"
                                    th:classappend="${b.status.name() == 'PAID' ? 'badge-paid' : 'badge-pending'}"
                                    th:text="${b.status}">PENDING</span>
                            </td>
                            <td>
                                <form th:if="${b.status.name() == 'PENDING'}" th:action="@{/customer/pay-bill}"
                                    method="post" class="d-flex gap-2 align-items-center flex-wrap">
                                    <input type="hidden" name="billId" th:value="${b.id}" />
                                    <input type="text" name="accountNumber" placeholder="Account Number"
                                        class="form-control form-control-sm bg-dark text-white border-secondary"
                                        style="width: 160px;" minlength="12" maxlength="12"
                                        title="Account number must be exactly 12 digits" required />
                                    <select name="paymentMethod"
                                        class="form-select form-select-sm bg-dark text-white border-secondary w-auto"
                                        required>
                                        <option value="CREDIT_CARD">Credit Card</option>
                                        <option value="BANK_TRANSFER">Bank Transfer</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-premium">Pay Now</button>
                                </form>
                                <div th:if="${b.status.name() == 'PAID'}" class="d-flex align-items-center gap-2">
                                    <i class="fas fa-check-circle text-success"></i>
                                    <span class="text-success small fw-bold">Settled</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
