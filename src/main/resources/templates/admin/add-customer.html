<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper})}">

<head>
    <title>Register New Customer - Smart Grid</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">
        <script>document.body.classList.add('admin-body');</script>
        <h2 class="text-silver mb-4">Register New Customer</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card mt-3">
            <div class="card-body">
                <form th:action="@{/admin/add-customer}" th:object="${user}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" required />
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" th:field="*{phone}" class="form-control" required />
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Setup Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required />
                        <small class="text-info opacity-75">Temporary password for the customer.</small>
                    </div>

                    <button type="submit" class="btn btn-primary">Register Customer</button>
                    <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
