<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper}, title=~{::title}, styles=~{::link}, bodyClass='admin-body')}">

<head>
    <title>Add Meter - Smart Grid</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">
        <script>document.body.classList.add('admin-body');</script>
        <h2 class="text-silver mb-4">Assign New Infrastructure</h2>
        <div class="card mt-3">
            <div class="card-body">
                <form th:action="@{/admin/add-meter}" th:object="${meter}" method="post">
                    <div class="mb-3">
                        <input type="text" th:field="*{meterNumber}" class="form-control" minlength="12" maxlength="12" title="Meter number must be exactly 12 characters" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Meter Type</label>
                        <select th:field="*{type}" class="form-select" required>
                            <option th:each="type : ${meterTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">District</label>
                        <select th:field="*{assignedAddress}" class="form-select" required>
                            <option value="">-- Select District --</option>
                            <option value="Bugesera">Bugesera</option>
                            <option value="Burera">Burera</option>
                            <option value="Gakenke">Gakenke</option>
                            <option value="Gasabo">Gasabo</option>
                            <option value="Gatsibo">Gatsibo</option>
                            <option value="Gicumbi">Gicumbi</option>
                            <option value="Gisagara">Gisagara</option>
                            <option value="Huye">Huye</option>
                            <option value="Kamonyi">Kamonyi</option>
                            <option value="Karongi">Karongi</option>
                            <option value="Kayonza">Kayonza</option>
                            <option value="Kicukiro">Kicukiro</option>
                            <option value="Kirehe">Kirehe</option>
                            <option value="Muhanga">Muhanga</option>
                            <option value="Musanze">Musanze</option>
                            <option value="Ngoma">Ngoma</option>
                            <option value="Ngororero">Ngororero</option>
                            <option value="Nyabihu">Nyabihu</option>
                            <option value="Nyagatare">Nyagatare</option>
                            <option value="Nyamagabe">Nyamagabe</option>
                            <option value="Nyamasheke">Nyamasheke</option>
                            <option value="Nyanza">Nyanza</option>
                            <option value="Nyarugenge">Nyarugenge</option>
                            <option value="Nyaruguru">Nyaruguru</option>
                            <option value="Rubavu">Rubavu</option>
                            <option value="Ruhango">Ruhango</option>
                            <option value="Rulindo">Rulindo</option>
                            <option value="Rusizi">Rusizi</option>
                            <option value="Rutsiro">Rutsiro</option>
                            <option value="Rwamagana">Rwamagana</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Assign to Customer</label>
                        <select name="userId" class="form-select" required>
                            <option value="">-- Select Customer --</option>
                            <option th:each="u : ${users}" th:if="${u.role.name() == 'CUSTOMER'}" th:value="${u.id}"
                                th:text="${u.fullName + ' (' + u.username + ')'}">
                            </option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Meter</button>
                    <a href="/admin/meters" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
