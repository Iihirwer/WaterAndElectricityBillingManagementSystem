<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper}, title=~{::title}, styles=~{}, bodyClass='admin-body')}">

<head>
    <title>Pending Users</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">

        <div class="row mb-4">
            <div class="col-12">
                <h2 class="display-6 text-silver">Pending Verification</h2>
                <p class="text-muted small">Systems awaiting administrative authorization</p>
                <hr class="border-silver">
            </div>
        </div>

        <div class="card admin-card p-4">
            <div th:if="${users.empty}" class="text-center p-5">
                <i class="fas fa-check-circle fa-4x text-green mb-3"></i>
                <h4 class="text-silver">All clears!</h4>
                <p class="text-muted">No pending user registrations found.</p>
                <a href="/admin/dashboard" class="btn btn-outline-info">Return to Tactical Center</a>
            </div>

            <div th:if="${!users.empty}" class="table-responsive">
                <table class="table table-hover text-silver align-middle">
                    <thead>
                        <tr class="text-uppercase small opacity-75">
                            <th>Username</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Registration Date</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="fw-bold" th:text="${user.username}">user123</td>
                            <td th:text="${user.fullName}">John Doe</td>
                            <td th:text="${user.email}">john@example.com</td>
                            <td><span class="badge bg-secondary">Awaiting Audit</span></td>
                            <td class="text-end">
                                <form th:action="@{/admin/verify-user/{id}(id=${user.id})}" method="post"
                                    style="display:inline;">
                                    <button type="submit" class="btn btn-green btn-sm px-4">
                                        <i class="fas fa-user-check me-2"></i>Verify
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
