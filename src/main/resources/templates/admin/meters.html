<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper})}">

<head>
    <title>Manage Meters</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">
        <script>document.body.classList.add('admin-body');</script>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-silver">System Infrastructure</h2>
            <a href="/admin/add-meter" class="btn btn-admin">Register New Meter</a>
        </div>

        <table class="table table-admin">
            <thead>
                <tr>
                    <th>Meter No.</th>
                    <th>Type</th>
                    <th>Assigned To</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${meters}" class="border-silver">
                    <td th:text="${m.meterNumber}">123</td>
                    <td>
                        <span class="badge"
                            th:classappend="${m.type.name() == 'WATER' ? 'bg-secondary' : 'bg-dark border border-silver'}"
                            th:text="${m.type}">WATER</span>
                    </td>
                    <td th:text="${m.user.fullName + ' (' + m.user.username + ')'}">User</td>
                    <td th:text="${m.assignedAddress}">Address</td>
                    <td>
                        <a th:href="@{/admin/add-reading/{id}(id=${m.id})}" class="btn btn-sm btn-success">Add
                            Reading</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
