<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content-wrapper}, title=~{::title}, styles=~{::link}, bodyClass='admin-body')}">

<head>
    <title>Manage Users - Smart Grid</title>
</head>

<body>
    <div class="content-wrapper">
        <link th:href="@{/css/admin.css}" rel="stylesheet">
        <script>document.body.classList.add('admin-body');</script>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-silver">Infrastructure Directory</h2>
            <div class="d-flex gap-2">
                <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}" class="form-control"
                        placeholder="Search by name/email..." style="max-width: 250px;">
                    <button type="submit" class="btn btn-admin-outline">Filter</button>
                    <a th:if="${search}" href="/admin/users" class="btn btn-sm btn-link text-silver">Clear</a>
                </form>
                <a href="/admin/add-customer" class="btn btn-admin">Register New Customer</a>
            </div>
        </div>

        <div th:if="${param.updated}" class="alert alert-success">User updated successfully.</div>
        <div th:if="${param.deleted}" class="alert alert-success">User deleted successfully.</div>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.fullName}">Name</td>
                    <td th:text="${u.username}">Username</td>
                    <td>
                        <span class="badge" th:classappend="${u.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                            th:text="${u.role}">ROLE</span>
                    </td>
                    <td th:text="${u.email}">email@test.com</td>
                    <td th:text="${u.phone}">123456</td>
                    <td>
                        <a th:href="@{/admin/edit-user/{id}(id=${u.id})}" class="btn btn-sm btn-warning me-1">Edit</a>
                        <form th:action="@{/admin/delete-user/{id}(id=${u.id})}" method="post" style="display:inline;"
                            onsubmit="return confirm('Are you sure you want to delete this user?');">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
