<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: html(content=~{::div.content}, title=~{::title}, styles=~{}, bodyClass='admin-body')}">

<head>
    <title>Add Meter Reading</title>
</head>

<body>
    <div class="content mt-4">
        <h2>Record Meter Reading</h2>
        <div class="card mt-3">
            <div class="card-body">
                <p><strong>Meter Number:</strong> <span th:text="${meter.meterNumber}"></span></p>
                <p><strong>Type:</strong> <span th:text="${meter.type}"></span></p>
                <p><strong>Customer:</strong> <span th:text="${meter.user.fullName}"></span></p>

                <form th:action="@{/admin/add-reading}" method="post" class="mt-4">
                    <input type="hidden" name="meterId" th:value="${meter.id}" />

                    <div class="mb-3">
                        <label class="form-label">Reading Value (Units)</label>
                        <input type="number" step="0.01" name="value" class="form-control" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Reading Date</label>
                        <input type="date" name="readingDate" class="form-control" required />
                    </div>

                    <button type="submit" class="btn btn-primary">Save Reading</button>
                    <a href="/admin/meters" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
