<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="html(content, title, styles, bodyClass)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Water & Electricity Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style th:replace="${styles}">
        body {
            padding-top: 80px;
        }
    </style>
</head>

<body th:class="${bodyClass}">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-customer"
        style="background: rgba(10, 11, 46, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 3px solid var(--nav-border-color, #ffb800);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">BILLING <span class="text-warning">PRO</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" sec:authorize="isAuthenticated()">
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link fw-bold text-light" href="/admin/dashboard" th:text="#{nav.admin}">ADMIN HUB</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('WATER_OFFICE')">
                        <a class="nav-link fw-bold text-info" href="/water-office/dashboard" th:text="#{nav.water}">WATER COMMAND</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ELECTRICITY_OFFICE')">
                        <a class="nav-link fw-bold text-warning" href="/electricity-office/dashboard" th:text="#{nav.electricity}">GRID COMMAND</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('CUSTOMER')">
                        <a class="nav-link fw-bold text-success" href="/customer/dashboard" th:text="#{nav.account}">MY ACCOUNT</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- Language Switcher -->
                    <li class="nav-item dropdown me-3">
                        <a class="nav-link dropdown-toggle btn btn-outline-warning btn-sm px-3 rounded-pill text-warning fw-bold" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-globe me-1"></i> <span th:text="#{nav.language}">Language</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow-lg border-0 mt-2" aria-labelledby="langDropdown" style="background: rgba(20, 22, 60, 0.95); backdrop-filter: blur(10px);">
                            <li><a class="dropdown-item" href="?lang=en"><img src="https://flagcdn.com/w20/us.png" class="me-2" alt="EN"> English</a></li>
                            <li><a class="dropdown-item" href="?lang=rw"><img src="https://flagcdn.com/w20/rw.png" class="me-2" alt="RW"> Kinyarwanda</a></li>
                            <li><a class="dropdown-item" href="?lang=fr"><img src="https://flagcdn.com/w20/fr.png" class="me-2" alt="FR"> Français</a></li>
                        </ul>
                    </li>
                    
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login" th:text="#{nav.login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register" th:text="#{nav.register}">Register</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="nav-link btn btn-link fw-bold text-danger border-0" th:text="#{nav.logout}">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <!-- Dashboard/Page content injected here -->
        <div th:replace="${content}"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
